name: Build-OTA-Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（例如：1.0.0）'
        required: false
        type: string
        default: 'auto'
      use_upx:
        description: 'build with upx'
        required: false
        type: boolean
        default: true
      release_type:
        description: '发布类型（Release type）'
        required: true
        type: choice
        default: '最新正式版（latest release）'
        options:
          - '最新正式版（latest release）'
          - '预发布版（pre-release）'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: write

jobs:
  build-ota:
    name: Build OTA (${{ matrix.id }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: aarch64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            ota_file: simadmin.tar.gz
          - id: x86_64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            ota_file: simadmin-x86_64.tar.gz

    outputs:
      version: ${{ steps.version.outputs.version }}
      build_time: ${{ steps.package.outputs.build_time }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read VERSION
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          CURRENT_VERSION=$(cat VERSION | tr -d '[:space:]')
          VERSION=$(echo "$INPUT_VERSION" | tr -d '[:space:]')

          if [ -z "$VERSION" ] || [ "$VERSION" = "auto" ]; then
            VERSION="$CURRENT_VERSION"
            SOURCE="VERSION file"
          else
            SOURCE="workflow input"
          fi

          if [ -z "$VERSION" ]; then
            echo "❌ 错误: 版本号不能为空"
            exit 1
          fi

          if ! echo "$VERSION" | grep -Eq '^[0-9]+(\.[0-9]+){1,3}([-.][0-9A-Za-z]+)*$'; then
            echo "❌ 错误: 版本号格式不合法: $VERSION"
            echo "示例: 1.0.0, 1.0.0-beta.1"
            exit 1
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "version_source=$SOURCE" >> $GITHUB_OUTPUT
          echo "📦 当前 VERSION 文件版本: $CURRENT_VERSION"
          echo "📦 本次打包版本号: $VERSION ($SOURCE)"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          musl-gcc --version

      - name: Install UPX (optional)
        if: inputs.use_upx == true
        run: |
          sudo apt-get install -y upx-ucl
          upx --version

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            backend/target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Sync version numbers
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "同步版本号: $VERSION"

          printf "%s\n" "$VERSION" > VERSION
          sed -i "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" backend/Cargo.toml
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" frontend/package.json

          echo "✅ 版本号同步完成"

      - name: Build backend (${{ matrix.target }})
        working-directory: backend
        env:
          TARGET: ${{ matrix.target }}
        run: |
          echo "🦀 构建后端 ($TARGET)..."

          case "$TARGET" in
            aarch64-unknown-linux-musl)
              export CC_AARCH64_UNKNOWN_LINUX_MUSL=musl-gcc
              export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=musl-gcc
              ;;
            x86_64-unknown-linux-musl)
              export CC_X86_64_UNKNOWN_LINUX_MUSL=musl-gcc
              export CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=musl-gcc
              ;;
            *)
              echo "❌ 不支持的 target: $TARGET"
              exit 1
              ;;
          esac

          export SQLITE3_STATIC=1
          export LIBSQLITE3_SYS_USE_PKG_CONFIG=0

          cargo build --release --target "$TARGET"

          BINARY_PATH="target/$TARGET/release/simadmin"
          echo "✅ 后端构建完成！"
          ls -lh "$BINARY_PATH"
          file "$BINARY_PATH"

      - name: Compress binary with UPX
        if: inputs.use_upx == true
        env:
          TARGET: ${{ matrix.target }}
        run: |
          BINARY_PATH="backend/target/$TARGET/release/simadmin"

          echo "🗜️  UPX 压缩中..."
          BEFORE_SIZE=$(stat -c%s "$BINARY_PATH")

          upx --best --lzma "$BINARY_PATH"

          AFTER_SIZE=$(stat -c%s "$BINARY_PATH")
          RATIO=$(echo "scale=1; 100 - ($AFTER_SIZE * 100 / $BEFORE_SIZE)" | bc)

          echo "✅ 压缩完成！节省: ${RATIO}%"
          ls -lh "$BINARY_PATH"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Build frontend
        working-directory: frontend
        run: |
          echo "🎨 构建前端..."
          pnpm install --frozen-lockfile
          pnpm run build

          echo "✅ 前端构建完成！"
          ls -lh dist/

      - name: Package OTA
        id: package
        env:
          TARGET: ${{ matrix.target }}
          OTA_FILE_NAME: ${{ matrix.ota_file }}
        run: |
          echo "=========================================="
          echo "  生成 OTA 更新包 ($TARGET)"
          echo "=========================================="
          echo ""

          VERSION="${{ steps.version.outputs.version }}"
          COMMIT=$(git rev-parse --short HEAD)
          BUILD_TIME=$(TZ=Asia/Shanghai date +"%Y-%m-%dT%H:%M:%S+08:00")
          ARCH="$TARGET"

          BINARY_PATH="backend/target/$TARGET/release/simadmin"
          FRONTEND_DIR="frontend/dist"

          if [ ! -f "$BINARY_PATH" ]; then
            echo "❌ 错误: 后端二进制不存在"
            exit 1
          fi

          if [ ! -d "$FRONTEND_DIR" ]; then
            echo "❌ 错误: 前端构建产物不存在"
            exit 1
          fi

          OTA_TMP=$(mktemp -d)

          echo "📦 版本: $VERSION"
          echo "📝 Commit: $COMMIT"
          echo "🕐 构建时间: $BUILD_TIME"
          echo "📍 架构: $ARCH"
          echo ""

          cp "$BINARY_PATH" "$OTA_TMP/simadmin"
          chmod 755 "$OTA_TMP/simadmin"

          BINARY_MD5=$(md5sum "$OTA_TMP/simadmin" | cut -d' ' -f1)
          echo "   MD5: $BINARY_MD5"

          mkdir -p "$OTA_TMP/www"
          cp -r "$FRONTEND_DIR"/* "$OTA_TMP/www/"

          FRONTEND_MD5=$(find "$OTA_TMP/www" -type f -exec md5sum {} \; | cut -d' ' -f1 | sort | md5sum | cut -d' ' -f1)
          echo "   MD5: $FRONTEND_MD5"

          cat > "$OTA_TMP/meta.json" << EOF
          {
              "version": "$VERSION",
              "commit": "$COMMIT",
              "build_time": "$BUILD_TIME",
              "binary_md5": "$BINARY_MD5",
              "frontend_md5": "$FRONTEND_MD5",
              "arch": "$ARCH"
          }
          EOF

          cat "$OTA_TMP/meta.json"
          echo ""

          mkdir -p release
          OTA_FILE="release/$OTA_FILE_NAME"

          cd "$OTA_TMP"
          tar -czf "$GITHUB_WORKSPACE/$OTA_FILE" meta.json simadmin www
          cd "$GITHUB_WORKSPACE"

          echo ""
          echo "✅ OTA 更新包打包完成: $OTA_FILE"
          ls -lh "$OTA_FILE"

          OTA_MD5=$(md5sum "$OTA_FILE" | cut -d' ' -f1)
          OTA_SHA256=$(sha256sum "$OTA_FILE" | cut -d' ' -f1)

          echo "ota_file=$OTA_FILE" >> $GITHUB_OUTPUT
          echo "ota_md5=$OTA_MD5" >> $GITHUB_OUTPUT
          echo "ota_sha256=$OTA_SHA256" >> $GITHUB_OUTPUT
          echo "build_time=$BUILD_TIME" >> $GITHUB_OUTPUT

      - name: Upload OTA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ota-${{ matrix.id }}
          path: release/${{ matrix.ota_file }}

      - name: Build Summary
        run: |
          echo "## 🎉 OTA 包构建完成 (${{ matrix.id }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 版本 | ${{ steps.version.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 架构 | ${{ matrix.target }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 产物 | \`${{ matrix.ota_file }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| UPX 压缩 | ${{ inputs.use_upx }} |" >> $GITHUB_STEP_SUMMARY

  publish-release:
    name: Publish Release
    needs: build-ota
    runs-on: ubuntu-latest

    steps:
      - name: Download OTA artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          pattern: ota-*
          merge-multiple: true

      - name: Verify artifacts
        run: |
          ls -lh release/
          test -f release/simadmin.tar.gz
          test -f release/simadmin-x86_64.tar.gz

      - name: Publish OTA package
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build-ota.outputs.version }}
          name: SimAdmin_v${{ needs.build-ota.outputs.version }}
          files: |
            release/simadmin.tar.gz
            release/simadmin-x86_64.tar.gz
          overwrite_files: true
          generate_release_notes: true
          body: |
            ## OTA 更新包

            ### 版本信息

            - **版本**: ${{ needs.build-ota.outputs.version }}
            - **Commit**: ${{ github.sha }}
            - **构建时间**: ${{ needs.build-ota.outputs.build_time }}
            - **发布类型**: ${{ inputs.release_type }}

            ### 产物

            | 架构 | 文件名 |
            |------|--------|
            | aarch64 (ARM64) | `simadmin.tar.gz` |
            | x86_64 (AMD64) | `simadmin-x86_64.tar.gz` |

            ### 安装说明

            ```bash
            # ARM64 设备
            curl -fsSL -o simadmin.tar.gz \
              https://github.com/3899/SimAdmin/releases/download/v${{ needs.build-ota.outputs.version }}/simadmin.tar.gz

            # x86_64 设备
            curl -fsSL -o simadmin-x86_64.tar.gz \
              https://github.com/3899/SimAdmin/releases/download/v${{ needs.build-ota.outputs.version }}/simadmin-x86_64.tar.gz

            # 上传 OTA 包到设备
            curl -X POST http://IP:3000/api/ota/upload \
              -F "file=@simadmin.tar.gz"

            # 开始 OTA 更新
            curl -X POST http://IP:3000/api/ota/apply
            ```
          draft: false
          prerelease: ${{ inputs.release_type == '预发布版（pre-release）' }}
          make_latest: ${{ inputs.release_type == '最新正式版（latest release）' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
